<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUR NEW CHAPTER — 우리의 시작</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;400;700&family=Playfair+Display:ital,wght@1,400&family=Outfit:wght@100;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .celebration-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a0f1a 0%, #050508 100%);
            text-align: center;
            overflow: hidden;
        }
        .final-message-box {
            max-width: 700px;
            padding: 40px;
            z-index: 10;
        }
        .heart-icon {
            font-size: 3rem;
            color: #e8a0b0;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .big-title {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #fff, #e8a0b0, #fff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .home-link {
            margin-top: 50px;
            display: inline-block;
            text-decoration: none;
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
            transition: 0.4s;
        }
        .home-link:hover { color: #fff; border-color: #fff; }
    </style>
</head>
<body>
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="cursor-follower" id="cursorFollower"></div>

    <div class="celebration-container">
        <div class="bg-layers">
            <div class="layer layer-bg" style="background-image: url('intro_background.png'); filter: brightness(0.3) blur(10px);"></div>
        </div>
        
        <div class="final-message-box">
            <div class="heart-icon">❤️</div>
            <h1 class="big-title">THANK YOU.</h1>
            <p class="intro-poetic" style="opacity: 1; color: #fff;">This means the world to me. I promise to make every moment count from here on.</p>
            <p class="intro-audio-note" style="margin-top: 20px;">I'll contact you very soon. Our journey begins again.</p>
            <a href="index.html" class="home-link">BACK TO HOME</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Simple cursor for this page
        const glow = document.getElementById('cursorGlow');
        const follower = document.getElementById('cursorFollower');
        window.addEventListener('mousemove', (e) => {
            gsap.to(glow, { x: e.clientX, y: e.clientY, duration: 1.2 });
            gsap.to(follower, { x: e.clientX, y: e.clientY, duration: 0.1 });
        });
        gsap.from('.final-message-box', { opacity: 0, y: 50, duration: 2, ease: 'power3.out' });
    </script>
</body>
</html>
