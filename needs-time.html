<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAKE YOUR TIME — 고마워요</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;400;700&family=Playfair+Display:ital,wght@1,400&family=Outfit:wght@100;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .waiting-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050508;
            text-align: center;
        }
        .waiting-box {
            max-width: 600px;
            padding: 40px;
        }
        .moon-icon {
            font-size: 2.5rem;
            color: rgba(255,255,255,0.2);
            margin-bottom: 30px;
        }
        .waiting-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            letter-spacing: 0.1em;
            margin-bottom: 25px;
            color: #fff;
        }
        .home-link {
            margin-top: 50px;
            display: inline-block;
            text-decoration: none;
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
            transition: 0.4s;
        }
        .home-link:hover { color: #fff; border-color: #fff; }
    </style>
</head>
<body>
    <div class="cursor-glow" id="cursorGlow"></div>
    <div class="cursor-follower" id="cursorFollower"></div>

    <div class="waiting-container">
        <div class="waiting-box">
            <div class="moon-icon">🌙</div>
            <h1 class="waiting-title">I UNDERSTAND.</h1>
            <p class="intro-poetic" style="opacity: 1; color: var(--text-dim);">There is no rush. Important things take time, and I am here whenever you are ready.</p>
            <p class="intro-audio-note" style="margin-top: 20px;">Thank you for even considering this journey with me.</p>
            <a href="index.html" class="home-link">BACK TO HOME</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        const glow = document.getElementById('cursorGlow');
        const follower = document.getElementById('cursorFollower');
        window.addEventListener('mousemove', (e) => {
            gsap.to(glow, { x: e.clientX, y: e.clientY, duration: 1.2 });
            gsap.to(follower, { x: e.clientX, y: e.clientY, duration: 0.1 });
        });
        gsap.from('.waiting-box', { opacity: 0, y: 30, duration: 2, ease: 'power3.out' });
    </script>
</body>
</html>
